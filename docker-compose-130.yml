services:
  kokoro:
    build:
      context: ./kokoro-cuda
      dockerfile: docker/gpu/Dockerfile
    container_name: kokoro-cuda
    ports:
      - "8880:8880"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  trainer:
    build:
      context: .
      dockerfile: Dockerfile.CU130
    container_name: trainer
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ./data:/app/data
      - ./my_real_samples:/app/my_real_samples
      - ./my_custom_model:/app/my_custom_model
    environment:
      - KOKORO_URL=http://kokoro:8880
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    depends_on:
      - kokoro

# Build command
# docker compose -f docker-compose-130.yml build trainer kokoro --no-cache

# Start Kokoro
# docker compose -f docker-compose-130.yml up kokoro

# Run the trainer script
# docker compose -f docker-compose-130.yml run --rm trainer ./setup-data.sh

# Initiate Training 
# docker compose -f docker-compose-130.yml run trainer python train.py --wake-word "hey gideon" --data-dir /app/data

# Test Run Command
# docker compose -f docker-compose-130.yml up
